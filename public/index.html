<!DOCTYPE html>
<html>
<head>
  <title>Mantenedor de Imágenes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Subir Imagen</h2>

<form id="form" class="mb-4">
  <select name="cityId" id="ciudadSelect" class="form-control mb-2" required></select>

  <input type="text" name="title" placeholder="Título" class="form-control mb-2">
  <textarea name="comments" placeholder="Comentarios" class="form-control mb-2"></textarea>

  <input type="file" name="image" class="form-control mb-2" required>
  <button class="btn btn-primary">Subir</button>
</form>

<hr>

<h2>Imágenes por Ciudad</h2>
<div id="list" class="row g-3"></div>

<script>
const form = document.getElementById("form");
const list = document.getElementById("list");
const ciudadSelect = document.getElementById("ciudadSelect");

let citiesMap = {};

// 🔹 cargar ciudades
async function loadCities() {
  const res = await fetch("/api/cities");
  const cities = await res.json();

  ciudadSelect.innerHTML = '<option value="">Seleccione ciudad</option>';

  cities.forEach(c => {
    citiesMap[c.id] = c.name;
    ciudadSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
  });
}

// 🔹 crear
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const fileInput = form.querySelector('input[name="image"]');
  const file = fileInput.files[0];
  const MAX_SIZE = 5 * 1024 * 1024; // 5MB

  if (!file) {
    alert("Debes seleccionar una imagen");
    return;
  }
   if (file.size > MAX_SIZE) {
    alert("La imagen no puede superar los 5MB");
    return;
  }


  const data = new FormData(form);

  await fetch("/api/images", {
    method: "POST",
    body: data
  });

  form.reset();
  loadImages();
});

// 🔥 eliminar
async function deleteImage(id) {
  if (!confirm("Eliminar imagen?")) return;

  await fetch(`/api/images/${id}`, {
    method: "DELETE"
  });

  loadImages();
}

// 🔥 editar
async function updateImage(id) {
  const title = prompt("Nuevo título:");
  const comments = prompt("Nuevos comentarios:");

  await fetch(`/api/images/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title, comments })
  });

  loadImages();
}

// 🔹 cargar imágenes agrupadas
async function loadImages() {
  const res = await fetch("/api/images");
  const images = await res.json();

  list.innerHTML = "";

  const grouped = {};

  images.forEach(img => {
    if (!grouped[img.cityId]) grouped[img.cityId] = [];
    grouped[img.cityId].push(img);
  });

  Object.keys(grouped).forEach(cityId => {
    let cityImages = grouped[cityId]
      .sort((a,b)=> b.id - a.id)
      .slice(0,3);

    list.innerHTML += `
      <div class="col-12">
        <div class="card">
          <div class="card-body">
            <h5>${citiesMap[cityId]}</h5>

            <div class="d-flex gap-3 flex-wrap">
              ${cityImages.map(img => `
                <div class="border p-2 text-center">
                  <img src="${img.url}" width="150"><br>

                  <strong>${img.title || ''}</strong><br>
                  <small>${img.comments || ''}</small><br>

                  <button class="btn btn-sm btn-warning mt-2"
                    onclick="updateImage(${img.id})">
                    Editar
                  </button>

                  <button class="btn btn-sm btn-danger mt-2"
                    onclick="deleteImage(${img.id})">
                    Eliminar
                  </button>
                </div>
              `).join("")}
            </div>

          </div>
        </div>
      </div>
    `;
  });
}

// init
loadCities();
loadImages();
</script>

</body>
</html>
